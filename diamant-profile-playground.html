<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartverwarmers — DIAMANT Profiel Pills Playground</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=aleo:700|fira-sans:300,400,500,600,700" rel="stylesheet">
<style>
/* ========== Reset & UI Chrome ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ui-bg: #1a1a2e;
  --ui-surface: #222240;
  --ui-border: #333355;
  --ui-text: #e0e0ec;
  --ui-text-dim: #8888aa;
  --ui-accent: #E8764B;
  --ui-accent-hover: #f08860;

  /* Hartverwarmers tokens */
  --hv-primary: #E8764B;
  --hv-primary-hover: #D4683F;
  --hv-text: #231E1A;
  --hv-text-secondary: #756C65;
  --hv-bg-white: #FFFFFF;
  --hv-bg-cream: #FEF8F4;
  --hv-bg-subtle: #F5F0EC;
  --hv-bg-accent-light: #FDF3EE;
  --hv-border-light: #EBE4DE;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--ui-bg);
  color: var(--ui-text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ========== Controls Panel ========== */
.controls {
  width: 320px;
  min-width: 320px;
  background: var(--ui-surface);
  border-right: 1px solid var(--ui-border);
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.controls h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--ui-accent);
  letter-spacing: 0.5px;
}

.controls h2 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--ui-text-dim);
  margin-bottom: 6px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.control-row label {
  font-size: 13px;
  color: var(--ui-text);
  white-space: nowrap;
}

/* Toggle buttons */
.toggle-group {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.toggle-btn {
  flex: 1;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--ui-border);
  background: transparent;
  color: var(--ui-text-dim);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-width: 0;
}

.toggle-btn:hover { border-color: var(--ui-accent); color: var(--ui-text); }
.toggle-btn.active { background: var(--ui-accent); border-color: var(--ui-accent); color: #fff; }

/* Presets */
.presets {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.preset-btn {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--ui-border);
  background: transparent;
  color: var(--ui-text);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}

.preset-btn:hover { border-color: var(--ui-accent); background: rgba(232,118,75,0.08); }
.preset-btn.active { border-color: var(--ui-accent); background: rgba(232,118,75,0.15); }

/* Checkbox toggle */
.toggle-switch {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--ui-text);
}

.toggle-switch input { display: none; }

.toggle-track {
  width: 36px;
  height: 20px;
  border-radius: 10px;
  background: var(--ui-border);
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}

.toggle-track::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.2s;
}

.toggle-switch input:checked + .toggle-track {
  background: var(--ui-accent);
}

.toggle-switch input:checked + .toggle-track::after {
  transform: translateX(16px);
}

/* Textarea */
.control-textarea {
  width: 100%;
  padding: 8px;
  font-size: 12px;
  font-family: 'Fira Sans', sans-serif;
  border: 1px solid var(--ui-border);
  background: rgba(0,0,0,0.2);
  color: var(--ui-text);
  border-radius: 6px;
  resize: vertical;
  min-height: 48px;
}

.control-textarea:focus {
  outline: none;
  border-color: var(--ui-accent);
}

/* ========== Main Area ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Preview */
.preview-container {
  flex: 1;
  overflow-y: auto;
  background: #e8e0d8;
  padding: 40px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}

.preview-frame {
  width: 340px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  background: var(--hv-bg-white);
  padding: 24px;
  font-family: 'Fira Sans', system-ui, sans-serif;
}

/* CSS output */
.css-area {
  background: var(--ui-surface);
  border-top: 1px solid var(--ui-border);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 200px;
}

.css-area h2 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--ui-text-dim);
}

.css-text {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ui-text);
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre-wrap;
  overflow-y: auto;
  flex: 1;
}

.copy-btn {
  align-self: flex-end;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--ui-accent);
  background: transparent;
  color: var(--ui-accent);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.copy-btn:hover { background: var(--ui-accent); color: #fff; }
.copy-btn.copied { background: #2ecc71; border-color: #2ecc71; color: #fff; }

/* ========== Preview Content Styles ========== */
.preview-section-label {
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--hv-primary);
  margin-bottom: 12px;
}

.preview-caption {
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 300;
  line-height: 1.5;
  color: var(--hv-text-secondary);
  margin-bottom: 16px;
}

.pills-container {
  transition: all 0.2s ease;
}

/* ========== Pill Styles ========== */
.pill {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 600;
  transition: all 0.15s ease;
  cursor: default;
  white-space: nowrap;
}

/* Letter shapes */
.letter-shape {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Aleo', serif;
  font-weight: 700;
  flex-shrink: 0;
  line-height: 1;
}

/* Diamond shape */
.letter-diamond {
  transform: rotate(45deg);
}

.letter-diamond span {
  transform: rotate(-45deg);
  display: block;
}

/* Hexagon shape */
.letter-hexagon {
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
}

/* Divider */
.preview-divider {
  border: none;
  border-top: 1px solid var(--hv-border-light);
  margin: 0;
}
</style>
</head>
<body>

<!-- ============ Controls ============ -->
<div class="controls">
  <h1>DIAMANT Profiel Pills</h1>

  <!-- Presets -->
  <div class="control-group">
    <h2>Presets</h2>
    <div class="presets" id="presets"></div>
  </div>

  <hr style="border:none; border-top:1px solid var(--ui-border);">

  <!-- Lettervorm -->
  <div class="control-group">
    <h2>Lettervorm</h2>
    <div class="toggle-group" id="letter-shape-toggle">
      <button class="toggle-btn active" data-val="diamond">Diamant</button>
      <button class="toggle-btn" data-val="circle">Cirkel</button>
      <button class="toggle-btn" data-val="rounded-square">Afgerond</button>
      <button class="toggle-btn" data-val="hexagon">Hexagon</button>
    </div>
  </div>

  <!-- Letterstijl -->
  <div class="control-group">
    <h2>Letterstijl</h2>
    <div class="toggle-group" id="letter-style-toggle">
      <button class="toggle-btn active" data-val="filled">Gevuld</button>
      <button class="toggle-btn" data-val="outlined">Omlijnd</button>
      <button class="toggle-btn" data-val="subtle">Subtiel</button>
    </div>
  </div>

  <!-- Pilstijl -->
  <div class="control-group">
    <h2>Pilstijl</h2>
    <div class="toggle-group" id="pill-style-toggle">
      <button class="toggle-btn active" data-val="filled">Gevuld</button>
      <button class="toggle-btn" data-val="outlined">Omlijnd</button>
      <button class="toggle-btn" data-val="ghost">Ghost</button>
      <button class="toggle-btn" data-val="tag">Tag</button>
    </div>
  </div>

  <!-- Grootte -->
  <div class="control-group">
    <h2>Grootte</h2>
    <div class="toggle-group" id="size-toggle">
      <button class="toggle-btn" data-val="compact">Compact</button>
      <button class="toggle-btn active" data-val="default">Standaard</button>
      <button class="toggle-btn" data-val="comfortable">Ruim</button>
    </div>
  </div>

  <!-- Hoekradius -->
  <div class="control-group">
    <h2>Hoekradius</h2>
    <div class="toggle-group" id="radius-toggle">
      <button class="toggle-btn active" data-val="pill">Pill</button>
      <button class="toggle-btn" data-val="rounded">Rond (8px)</button>
      <button class="toggle-btn" data-val="slight">Licht (4px)</button>
      <button class="toggle-btn" data-val="sharp">Scherp (0)</button>
    </div>
  </div>

  <!-- Kleurintensiteit -->
  <div class="control-group">
    <h2>Kleurintensiteit</h2>
    <div class="toggle-group" id="color-intensity-toggle">
      <button class="toggle-btn active" data-val="full">Volledig</button>
      <button class="toggle-btn" data-val="muted">Gedempt</button>
      <button class="toggle-btn" data-val="neutral-accent">Neutraal+</button>
      <button class="toggle-btn" data-val="neutral">Neutraal</button>
    </div>
  </div>

  <!-- Toelichting -->
  <div class="control-group">
    <h2>Toelichting</h2>
    <label class="toggle-switch">
      <input type="checkbox" id="caption-toggle" checked>
      <span class="toggle-track"></span>
      Toon toelichting
    </label>
    <textarea class="control-textarea" id="caption-text">De DIAMANT-doelen waarop deze fiche focust.</textarea>
  </div>

  <!-- Inactieve doelen -->
  <div class="control-group">
    <h2>Inactieve doelen</h2>
    <label class="toggle-switch">
      <input type="checkbox" id="inactive-toggle">
      <span class="toggle-track"></span>
      Toon niet-actieve doelen
    </label>
  </div>

  <!-- Layout -->
  <div class="control-group">
    <h2>Layout</h2>
    <div class="toggle-group" id="layout-toggle">
      <button class="toggle-btn active" data-val="wrap">Flex wrap</button>
      <button class="toggle-btn" data-val="vertical">Verticaal</button>
      <button class="toggle-btn" data-val="inline">Inline</button>
    </div>
  </div>
</div>

<!-- ============ Main ============ -->
<div class="main">
  <div class="preview-container">
    <div class="preview-frame">
      <div class="preview-section-label">DIAMANT profiel</div>
      <div id="caption-display" class="preview-caption">De DIAMANT-doelen waarop deze fiche focust.</div>
      <div id="pills-preview" class="pills-container"></div>
    </div>
  </div>

  <div class="css-area">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Gegenereerde CSS</h2>
      <button class="copy-btn" id="copy-btn">Kopieer CSS</button>
    </div>
    <div class="css-text" id="css-output"></div>
  </div>
</div>

<script>
// ========== DIAMANT Data ==========
const FACETS = [
  { letter: 'D', keyword: 'Doen', slug: 'doen', active: true },
  { letter: 'I', keyword: 'Inclusief', slug: 'inclusief', active: true },
  { letter: 'A', keyword: 'Autonomie', slug: 'autonomie', active: false },
  { letter: 'M', keyword: 'Mensgericht', slug: 'mensgericht', active: true },
  { letter: 'A', keyword: 'Anderen', slug: 'anderen', active: false },
  { letter: 'N', keyword: 'Normalisatie', slug: 'normalisatie', active: false },
  { letter: 'T', keyword: 'Talent', slug: 'talent', active: false },
];

// ========== State ==========
const state = {
  letterShape: 'diamond',
  letterStyle: 'filled',
  pillStyle: 'filled',
  size: 'default',
  radius: 'pill',
  colorIntensity: 'full',
  showCaption: true,
  captionText: 'De DIAMANT-doelen waarop deze fiche focust.',
  showInactive: false,
  layout: 'wrap',
};

// ========== Presets ==========
const PRESETS = {
  'huidig': {
    label: 'Huidig (koraal gevuld)',
    letterShape: 'circle', letterStyle: 'filled', pillStyle: 'filled',
    size: 'default', radius: 'pill', colorIntensity: 'full',
    showCaption: false, showInactive: false, layout: 'wrap',
  },
  'subtiele-tags': {
    label: 'Subtiele tags',
    letterShape: 'diamond', letterStyle: 'subtle', pillStyle: 'tag',
    size: 'default', radius: 'rounded', colorIntensity: 'muted',
    showCaption: true, showInactive: false, layout: 'wrap',
  },
  'diamant-accent': {
    label: 'Diamant accent',
    letterShape: 'diamond', letterStyle: 'filled', pillStyle: 'ghost',
    size: 'default', radius: 'pill', colorIntensity: 'neutral-accent',
    showCaption: true, showInactive: true, layout: 'wrap',
  },
  'minimaal': {
    label: 'Minimaal',
    letterShape: 'diamond', letterStyle: 'outlined', pillStyle: 'ghost',
    size: 'compact', radius: 'pill', colorIntensity: 'neutral',
    showCaption: false, showInactive: false, layout: 'inline',
  },
  'omlijnd': {
    label: 'Omlijnd',
    letterShape: 'rounded-square', letterStyle: 'outlined', pillStyle: 'outlined',
    size: 'default', radius: 'slight', colorIntensity: 'full',
    showCaption: true, showInactive: true, layout: 'vertical',
  },
};

// ========== Init Presets ==========
const presetsContainer = document.getElementById('presets');
Object.entries(PRESETS).forEach(([key, preset]) => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.dataset.preset = key;
  btn.textContent = preset.label;
  btn.addEventListener('click', () => {
    Object.keys(preset).forEach(k => {
      if (k === 'label') return;
      state[k] = preset[k];
    });
    // Keep caption text
    syncControls();
    updateAll();
  });
  presetsContainer.appendChild(btn);
});

// ========== Init Toggle Groups ==========
function initToggle(containerId, stateKey) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state[stateKey] = btn.dataset.val;
      container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateAll();
    });
  });
}

initToggle('letter-shape-toggle', 'letterShape');
initToggle('letter-style-toggle', 'letterStyle');
initToggle('pill-style-toggle', 'pillStyle');
initToggle('size-toggle', 'size');
initToggle('radius-toggle', 'radius');
initToggle('color-intensity-toggle', 'colorIntensity');
initToggle('layout-toggle', 'layout');

// ========== Init Toggles (checkbox) ==========
document.getElementById('caption-toggle').addEventListener('change', (e) => {
  state.showCaption = e.target.checked;
  updateAll();
});

document.getElementById('inactive-toggle').addEventListener('change', (e) => {
  state.showInactive = e.target.checked;
  updateAll();
});

document.getElementById('caption-text').addEventListener('input', (e) => {
  state.captionText = e.target.value;
  updateAll();
});

// ========== Sync Controls ==========
function syncControls() {
  const toggles = {
    'letter-shape-toggle': 'letterShape',
    'letter-style-toggle': 'letterStyle',
    'pill-style-toggle': 'pillStyle',
    'size-toggle': 'size',
    'radius-toggle': 'radius',
    'color-intensity-toggle': 'colorIntensity',
    'layout-toggle': 'layout',
  };

  Object.entries(toggles).forEach(([id, key]) => {
    document.querySelectorAll(`#${id} .toggle-btn`).forEach(b => {
      b.classList.toggle('active', b.dataset.val === state[key]);
    });
  });

  document.getElementById('caption-toggle').checked = state.showCaption;
  document.getElementById('inactive-toggle').checked = state.showInactive;

  // Highlight active preset
  document.querySelectorAll('.preset-btn').forEach(btn => {
    const p = PRESETS[btn.dataset.preset];
    const match = Object.keys(p).every(k => {
      if (k === 'label') return true;
      if (k === 'captionText') return true;
      return state[k] === p[k];
    });
    btn.classList.toggle('active', match);
  });
}

// ========== Style Computations ==========
function getSizeValues() {
  switch (state.size) {
    case 'compact': return { letterSize: 18, fontSize: 12, gap: 4, padX: 8, padY: 3 };
    case 'default': return { letterSize: 22, fontSize: 13, gap: 6, padX: 12, padY: 5 };
    case 'comfortable': return { letterSize: 28, fontSize: 14, gap: 8, padX: 16, padY: 7 };
  }
}

function getRadius() {
  switch (state.radius) {
    case 'pill': return '9999px';
    case 'rounded': return '8px';
    case 'slight': return '4px';
    case 'sharp': return '0px';
  }
}

function getLetterRadius(size) {
  switch (state.letterShape) {
    case 'diamond': return '3px';
    case 'circle': return '50%';
    case 'rounded-square': return '4px';
    case 'hexagon': return '0';
  }
}

function getColors(isActive) {
  const primary = '#E8764B';
  const primaryMuted = '#C4845E';
  const primaryLight = '#FDF3EE';
  const primaryLighter = '#FEF8F4';
  const neutralBg = '#F5F0EC';
  const neutralText = '#756C65';
  const neutralBorder = '#EBE4DE';
  const white = '#FFFFFF';
  const textDark = '#231E1A';

  if (!isActive) {
    return {
      letterBg: neutralBg,
      letterColor: '#B0A89F',
      letterBorder: neutralBorder,
      pillBg: 'transparent',
      pillColor: '#B0A89F',
      pillBorder: 'transparent',
    };
  }

  let letterBg, letterColor, letterBorder, pillBg, pillColor, pillBorder;

  // Letter style colors based on intensity
  switch (state.colorIntensity) {
    case 'full':
      letterBg = primary; letterColor = white; letterBorder = primary;
      break;
    case 'muted':
      letterBg = primaryMuted; letterColor = white; letterBorder = primaryMuted;
      break;
    case 'neutral-accent':
      letterBg = primary; letterColor = white; letterBorder = primary;
      break;
    case 'neutral':
      letterBg = neutralBg; letterColor = neutralText; letterBorder = neutralBorder;
      break;
  }

  // Override for letter style
  if (state.letterStyle === 'outlined') {
    letterBg = 'transparent';
    letterColor = state.colorIntensity === 'neutral' ? neutralText : primary;
    letterBorder = state.colorIntensity === 'neutral' ? neutralBorder : primary;
  } else if (state.letterStyle === 'subtle') {
    letterBg = state.colorIntensity === 'neutral' ? neutralBg : primaryLight;
    letterColor = state.colorIntensity === 'neutral' ? neutralText : primary;
    letterBorder = 'transparent';
  }

  // Pill style colors
  switch (state.pillStyle) {
    case 'filled':
      if (state.colorIntensity === 'neutral') {
        pillBg = neutralBg; pillColor = textDark; pillBorder = 'transparent';
      } else if (state.colorIntensity === 'neutral-accent') {
        pillBg = neutralBg; pillColor = textDark; pillBorder = 'transparent';
      } else if (state.colorIntensity === 'muted') {
        pillBg = primaryMuted; pillColor = white; pillBorder = 'transparent';
      } else {
        pillBg = primary; pillColor = white; pillBorder = 'transparent';
      }
      break;
    case 'outlined':
      pillBg = 'transparent';
      pillColor = state.colorIntensity === 'neutral' ? neutralText : primary;
      pillBorder = state.colorIntensity === 'neutral' ? neutralBorder : primary;
      break;
    case 'ghost':
      pillBg = 'transparent'; pillColor = textDark; pillBorder = 'transparent';
      break;
    case 'tag':
      pillBg = state.colorIntensity === 'neutral' ? neutralBg : primaryLighter;
      pillColor = state.colorIntensity === 'neutral' ? neutralText : textDark;
      pillBorder = 'transparent';
      break;
  }

  return { letterBg, letterColor, letterBorder, pillBg, pillColor, pillBorder };
}

// ========== Render Pills ==========
function renderPill(facet, isActive) {
  const s = getSizeValues();
  const r = getRadius();
  const c = getColors(isActive);

  const isDiamond = state.letterShape === 'diamond';
  const isHexagon = state.letterShape === 'hexagon';
  const letterR = getLetterRadius(s.letterSize);

  // Letter element
  const diamondSize = isDiamond ? Math.round(s.letterSize * 0.82) : s.letterSize;
  const letterFontSize = isDiamond ? Math.round(s.letterSize * 0.48) : Math.round(s.letterSize * 0.55);

  let letterStyle = `
    width: ${diamondSize}px;
    height: ${diamondSize}px;
    font-size: ${letterFontSize}px;
    background: ${c.letterBg};
    color: ${c.letterColor};
  `;

  if (state.letterStyle === 'outlined') {
    letterStyle += `border: 2px solid ${c.letterBorder};`;
  }

  if (!isDiamond && !isHexagon) {
    letterStyle += `border-radius: ${letterR};`;
  }

  let letterClass = 'letter-shape';
  if (isDiamond) letterClass += ' letter-diamond';
  if (isHexagon) letterClass += ' letter-hexagon';

  const letterContent = isDiamond
    ? `<span>${facet.letter}</span>`
    : facet.letter;

  // Pill element
  let pillStyle = `
    gap: ${s.gap}px;
    padding: ${s.padY}px ${s.padX}px;
    font-size: ${s.fontSize}px;
    border-radius: ${r};
    background: ${c.pillBg};
    color: ${c.pillColor};
  `;

  if (state.pillStyle === 'outlined') {
    pillStyle += `border: 1px solid ${c.pillBorder};`;
  } else {
    pillStyle += `border: 1px solid transparent;`;
  }

  if (!isActive) {
    pillStyle += `opacity: 0.55;`;
  }

  const keyword = state.pillStyle === 'ghost' && !state.showInactive && state.layout === 'inline'
    ? ''
    : facet.keyword;

  return `<span class="pill" style="${pillStyle}" title="${facet.keyword}">
    <span class="${letterClass}" style="${letterStyle}">${letterContent}</span>
    ${keyword ? `<span>${keyword}</span>` : ''}
  </span>`;
}

function renderPreview() {
  const container = document.getElementById('pills-preview');
  const captionEl = document.getElementById('caption-display');

  // Caption
  if (state.showCaption && state.captionText) {
    captionEl.style.display = 'block';
    captionEl.textContent = state.captionText;
  } else {
    captionEl.style.display = 'none';
  }

  // Layout
  let layoutStyle = '';
  switch (state.layout) {
    case 'wrap':
      layoutStyle = 'display: flex; flex-wrap: wrap; gap: 8px;';
      break;
    case 'vertical':
      layoutStyle = 'display: flex; flex-direction: column; gap: 6px; align-items: flex-start;';
      break;
    case 'inline':
      layoutStyle = 'display: flex; flex-wrap: wrap; gap: 6px; align-items: center;';
      break;
  }

  container.style.cssText = layoutStyle;

  // Pills
  const facetsToShow = state.showInactive ? FACETS : FACETS.filter(f => f.active);
  container.innerHTML = facetsToShow.map(f => renderPill(f, f.active)).join('');
}

// ========== Generate CSS ==========
function generateCSS() {
  const s = getSizeValues();
  const r = getRadius();
  const c = getColors(true);
  const ci = getColors(false);
  const isDiamond = state.letterShape === 'diamond';
  const isHexagon = state.letterShape === 'hexagon';
  const letterR = getLetterRadius(s.letterSize);
  const diamondSize = isDiamond ? Math.round(s.letterSize * 0.82) : s.letterSize;
  const letterFontSize = isDiamond ? Math.round(s.letterSize * 0.48) : Math.round(s.letterSize * 0.55);

  let css = '';

  // .diamant-pill
  css += `.diamant-pill {\n`;
  css += `  display: inline-flex;\n`;
  css += `  align-items: center;\n`;
  css += `  gap: ${s.gap}px;\n`;
  css += `  padding: ${s.padY}px ${s.padX}px;\n`;
  css += `  border-radius: ${r};\n`;
  css += `  font-family: var(--font-body);\n`;
  css += `  font-weight: 600;\n`;
  css += `  font-size: ${s.fontSize}px;\n`;
  css += `  background: ${c.pillBg};\n`;
  css += `  color: ${c.pillColor};\n`;
  if (state.pillStyle === 'outlined') {
    css += `  border: 1px solid ${c.pillBorder};\n`;
  }
  css += `  transition: all 0.15s ease;\n`;
  css += `  text-decoration: none;\n`;
  css += `}\n\n`;

  // .diamant-letter
  css += `.diamant-letter {\n`;
  css += `  display: inline-flex;\n`;
  css += `  align-items: center;\n`;
  css += `  justify-content: center;\n`;
  css += `  width: ${diamondSize}px;\n`;
  css += `  height: ${diamondSize}px;\n`;
  css += `  font-family: var(--font-heading);\n`;
  css += `  font-weight: 700;\n`;
  css += `  font-size: ${letterFontSize}px;\n`;
  css += `  background: ${c.letterBg};\n`;
  css += `  color: ${c.letterColor};\n`;
  css += `  flex-shrink: 0;\n`;
  css += `  line-height: 1;\n`;

  if (isDiamond) {
    css += `  border-radius: 3px;\n`;
    css += `  transform: rotate(45deg);\n`;
  } else if (isHexagon) {
    css += `  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);\n`;
  } else {
    css += `  border-radius: ${letterR};\n`;
  }

  if (state.letterStyle === 'outlined') {
    css += `  border: 2px solid ${c.letterBorder};\n`;
  }

  css += `}\n`;

  if (isDiamond) {
    css += `\n.diamant-letter span {\n`;
    css += `  transform: rotate(-45deg);\n`;
    css += `  display: block;\n`;
    css += `}\n`;
  }

  // Inactive style
  if (state.showInactive) {
    css += `\n.diamant-pill-inactive {\n`;
    css += `  opacity: 0.55;\n`;
    css += `  background: transparent;\n`;
    css += `  color: ${ci.pillColor};\n`;
    css += `}\n`;
    css += `\n.diamant-letter-inactive {\n`;
    css += `  background: ${ci.letterBg};\n`;
    css += `  color: ${ci.letterColor};\n`;
    css += `}\n`;
  }

  return css;
}

function updateCSS() {
  document.getElementById('css-output').textContent = generateCSS();
}

// ========== Update All ==========
function updateAll() {
  renderPreview();
  updateCSS();
  syncControls();
}

// ========== Copy Button ==========
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('css-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Gekopieerd!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopieer CSS'; btn.classList.remove('copied'); }, 1500);
  });
});

// ========== Init ==========
updateAll();
</script>
