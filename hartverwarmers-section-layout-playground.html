<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hartverwarmers — Section Layout Playground</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=aleo:700|fira-sans:300,400,500,600,700" rel="stylesheet">
<style>
/* ========== Reset & UI Chrome ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ui-bg: #1a1a2e;
  --ui-surface: #222240;
  --ui-border: #333355;
  --ui-text: #e0e0ec;
  --ui-text-dim: #8888aa;
  --ui-accent: #E8764B;
  --ui-accent-hover: #f08860;

  /* Hartverwarmers tokens */
  --hv-primary: #E8764B;
  --hv-primary-hover: #D4683F;
  --hv-text: #1F1F1F;
  --hv-text-secondary: #6F6F6F;
  --hv-bg-white: #FFFFFF;
  --hv-bg-cream: #FEF8F4;
  --hv-bg-subtle: #F5F0EC;
  --hv-bg-accent-light: #FDF3EE;
  --hv-border-light: #EBE4DE;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--ui-bg);
  color: var(--ui-text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ========== Controls Panel ========== */
.controls {
  width: 320px;
  min-width: 320px;
  background: var(--ui-surface);
  border-right: 1px solid var(--ui-border);
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.controls h1 {
  font-size: 15px;
  font-weight: 700;
  color: var(--ui-accent);
  letter-spacing: 0.5px;
}

.controls h2 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--ui-text-dim);
  margin-bottom: 8px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.control-row label {
  font-size: 13px;
  color: var(--ui-text);
  white-space: nowrap;
}

.control-row .value-display {
  font-size: 11px;
  color: var(--ui-text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  min-width: 40px;
  text-align: right;
}

/* Color swatch buttons */
.color-options {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}

.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: var(--ui-accent); box-shadow: 0 0 0 2px rgba(232,118,75,0.3); }

.color-swatch::after {
  content: attr(data-label);
  position: absolute;
  bottom: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: var(--ui-text-dim);
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.color-swatch:hover::after { opacity: 1; }

/* Sliders */
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 4px;
  background: var(--ui-border);
  border-radius: 2px;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--ui-accent);
  cursor: pointer;
}

/* Toggle buttons */
.toggle-group {
  display: flex;
  gap: 4px;
}

.toggle-btn {
  flex: 1;
  padding: 6px 8px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--ui-border);
  background: transparent;
  color: var(--ui-text-dim);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.toggle-btn:hover { border-color: var(--ui-accent); color: var(--ui-text); }
.toggle-btn.active { background: var(--ui-accent); border-color: var(--ui-accent); color: #fff; }

/* Presets */
.presets {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.preset-btn {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--ui-border);
  background: transparent;
  color: var(--ui-text);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}

.preset-btn:hover { border-color: var(--ui-accent); background: rgba(232,118,75,0.08); }

/* ========== Main Area ========== */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Preview */
.preview-container {
  flex: 1;
  overflow-y: auto;
  background: #e8e0d8;
  padding: 24px;
}

.preview-frame {
  max-width: 1100px;
  margin: 0 auto;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* Prompt output */
.prompt-area {
  background: var(--ui-surface);
  border-top: 1px solid var(--ui-border);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 100px;
}

.prompt-area h2 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--ui-text-dim);
}

.prompt-text {
  font-size: 13px;
  line-height: 1.5;
  color: var(--ui-text);
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: pre-wrap;
  max-height: 80px;
  overflow-y: auto;
}

.copy-btn {
  align-self: flex-end;
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--ui-accent);
  background: transparent;
  color: var(--ui-accent);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}

.copy-btn:hover { background: var(--ui-accent); color: #fff; }
.copy-btn.copied { background: #2ecc71; border-color: #2ecc71; color: #fff; }

/* ========== Preview Content (Hartverwarmers Style) ========== */
.hv-section { transition: background-color 0.3s ease, padding 0.3s ease; }

.hv-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding-left: 24px;
  padding-right: 24px;
}

.hv-section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 1.5rem;
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--hv-primary);
  margin-bottom: 4px;
}

.hv-h1 {
  font-family: 'Aleo', serif;
  font-weight: 700;
  font-size: 2.5rem;
  line-height: 1.25;
  color: var(--hv-text);
  margin-top: 4px;
}

.hv-h2 {
  font-family: 'Aleo', serif;
  font-weight: 700;
  font-size: 2rem;
  line-height: 1.25;
  color: var(--hv-text);
  margin-bottom: 16px;
}

.hv-h3 {
  font-family: 'Aleo', serif;
  font-weight: 700;
  font-size: 1.25rem;
  line-height: 1.3;
  color: var(--hv-text);
}

.hv-body {
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 300;
  font-size: 1rem;
  line-height: 1.6;
  color: var(--hv-text-secondary);
}

.hv-intro {
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 300;
  font-size: 1.35rem;
  line-height: 1.5;
  color: var(--hv-text-secondary);
  margin-top: 16px;
}

.hv-cta-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 600;
  color: var(--hv-primary);
  text-decoration: none;
  font-size: 0.9rem;
}

.hv-cta-link::after { content: '\2192'; }

.hv-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid var(--hv-border-light);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.hv-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(60,40,20,0.1);
}

.hv-card-img {
  width: 100%;
  height: 180px;
  background: linear-gradient(135deg, #d4a97a 0%, #e8c4a0 50%, #b8926a 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-family: 'Fira Sans', sans-serif;
}

.hv-card-body { padding: 20px; }

.hv-card-desc {
  font-family: 'Fira Sans', system-ui, sans-serif;
  font-weight: 300;
  font-size: 0.9rem;
  line-height: 1.5;
  color: var(--hv-text-secondary);
  margin-top: 8px;
  margin-bottom: 12px;
}

.hv-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* Horizontal card (tools-style) */
.hv-card-h {
  background: #fff;
  border-radius: 12px;
  border: 1px solid var(--hv-border-light);
  overflow: hidden;
  display: flex;
  transition: transform 0.2s, box-shadow 0.2s;
}

.hv-card-h:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(60,40,20,0.1);
}

.hv-card-h-img {
  width: 140px;
  min-height: 100px;
  flex-shrink: 0;
  background: linear-gradient(135deg, #c4a07a 0%, #e0b890 100%);
}

.hv-card-h-body { padding: 16px; flex: 1; }

.hv-card-h-format {
  font-size: 0.75rem;
  color: var(--hv-text-secondary);
  font-family: 'Fira Sans', sans-serif;
}

.hv-card-h-teaser {
  font-size: 0.85rem;
  color: var(--hv-text-secondary);
  font-family: 'Fira Sans', sans-serif;
  font-weight: 300;
  margin-top: 4px;
}

/* Separator */
.hv-separator-hr {
  border: none;
  border-top: 1px solid var(--hv-border-light);
  margin: 0;
}

.hv-separator-none { display: none; }

/* Meta group */
.hv-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 16px;
  color: var(--hv-text-secondary);
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 300;
}

.hv-meta-item { display: inline-flex; align-items: center; gap: 6px; }

.hv-meta-icon {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Video lesson row */
.hv-lesson-row {
  display: flex;
  gap: 32px;
  align-items: center;
  padding: 32px 0;
}

.hv-lesson-img {
  width: 42%;
  flex-shrink: 0;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(135deg, #b8926a 0%, #d4a97a 50%, #c4966e 100%);
  aspect-ratio: 16/10;
}

.hv-lesson-content { flex: 1; }

.hv-lesson-label {
  font-size: 0.8rem;
  font-family: 'Fira Sans', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--hv-primary);
}

/* Detail page hero with side-by-side */
.hv-detail-hero {
  display: flex;
  gap: 32px;
  align-items: flex-start;
}

.hv-detail-hero-content { flex: 1; }

.hv-detail-hero-img {
  width: 42%;
  flex-shrink: 0;
  border-radius: 12px;
  overflow: hidden;
  background: linear-gradient(135deg, #c4a07a 0%, #dab890 50%, #b89068 100%);
  aspect-ratio: 4/3;
}

.hv-btn-primary {
  display: inline-flex;
  align-items: center;
  padding: 10px 24px;
  font-family: 'Fira Sans', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  color: #fff;
  background: var(--hv-primary);
  border-radius: 8px;
  text-decoration: none;
  margin-top: 16px;
}

/* Steps */
.hv-step {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
}

.hv-step-num {
  font-family: 'Aleo', serif;
  font-weight: 700;
  font-size: 1.5rem;
  color: var(--hv-primary);
  line-height: 1;
  flex-shrink: 0;
}

/* Goal section 2-col */
.hv-two-col {
  display: flex;
  gap: 32px;
}

.hv-two-col-label { width: 25%; flex-shrink: 0; }
.hv-two-col-content { flex: 1; }

/* Download CTA */
.hv-download-box {
  background: var(--hv-bg-subtle);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin-top: 32px;
}

/* Zone indicator */
.zone-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: -apple-system, sans-serif;
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 10;
  background: rgba(0,0,0,0.5);
  color: #fff;
}
</style>
</head>
<body>

<!-- ============ Controls ============ -->
<div class="controls">
  <h1>Section Layout Playground</h1>

  <!-- Page Template -->
  <div class="control-group">
    <h2>Paginasjabloon</h2>
    <div class="toggle-group" id="template-toggle">
      <button class="toggle-btn active" data-val="index">Index</button>
      <button class="toggle-btn" data-val="listing">Listing</button>
      <button class="toggle-btn" data-val="detail">Detail</button>
    </div>
  </div>

  <!-- Hero Zone -->
  <div class="control-group">
    <h2>Hero / Intro</h2>
    <div class="color-options" id="hero-colors"></div>
    <div class="control-row">
      <label>Padding</label>
      <input type="range" id="hero-padding" min="24" max="96" step="4" value="48" style="flex:1; margin: 0 8px;">
      <span class="value-display" id="hero-padding-val">48px</span>
    </div>
  </div>

  <!-- Section A -->
  <div class="control-group">
    <h2>Sectie A</h2>
    <div class="color-options" id="secA-colors"></div>
    <div class="control-row">
      <label>Padding</label>
      <input type="range" id="secA-padding" min="24" max="96" step="4" value="64" style="flex:1; margin: 0 8px;">
      <span class="value-display" id="secA-padding-val">64px</span>
    </div>
  </div>

  <!-- Section B -->
  <div class="control-group">
    <h2>Sectie B</h2>
    <div class="color-options" id="secB-colors"></div>
    <div class="control-row">
      <label>Padding</label>
      <input type="range" id="secB-padding" min="24" max="96" step="4" value="64" style="flex:1; margin: 0 8px;">
      <span class="value-display" id="secB-padding-val">64px</span>
    </div>
  </div>

  <!-- Separator -->
  <div class="control-group">
    <h2>Scheiding tussen secties</h2>
    <div class="toggle-group" id="separator-toggle">
      <button class="toggle-btn" data-val="none">Geen</button>
      <button class="toggle-btn active" data-val="bgcolor">Achtergrond</button>
      <button class="toggle-btn" data-val="hr">HR-lijn</button>
    </div>
  </div>

  <!-- Presets -->
  <div class="control-group">
    <h2>Presets</h2>
    <div class="presets">
      <button class="preset-btn" data-preset="tools-index">Huidige: Tools Index (cream / wit / cream)</button>
      <button class="preset-btn" data-preset="workshops">Huidige: Workshops (alles wit)</button>
      <button class="preset-btn" data-preset="all-white">Alles wit</button>
      <button class="preset-btn" data-preset="all-cream">Alles crème</button>
      <button class="preset-btn" data-preset="alternating">Afwisselend crème/wit/crème</button>
      <button class="preset-btn" data-preset="cream-hero">Crème hero + witte secties</button>
      <button class="preset-btn" data-preset="subtle-hero">Subtiel hero + wit + crème</button>
    </div>
  </div>
</div>

<!-- ============ Main ============ -->
<div class="main">
  <div class="preview-container">
    <div class="preview-frame" id="preview"></div>
  </div>

  <div class="prompt-area">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Uitvoer — CSS klassen</h2>
      <button class="copy-btn" id="copy-btn">Kopieer</button>
    </div>
    <div class="prompt-text" id="prompt-text"></div>
  </div>
</div>

<script>
// ========== Color Palette ==========
const COLORS = [
  { key: 'white',        hex: '#FFFFFF', label: 'Wit',     cssVar: '--color-bg-white',        twClass: 'bg-white' },
  { key: 'cream',        hex: '#FEF8F4', label: 'Crème',   cssVar: '--color-bg-cream',        twClass: 'bg-[var(--color-bg-cream)]' },
  { key: 'subtle',       hex: '#F5F0EC', label: 'Subtiel', cssVar: '--color-bg-subtle',       twClass: 'bg-[var(--color-bg-subtle)]' },
  { key: 'accent-light', hex: '#FDF3EE', label: 'Accent',  cssVar: '--color-bg-accent-light', twClass: 'bg-[var(--color-bg-accent-light)]' },
];

// ========== State ==========
const DEFAULTS = {
  template: 'index',
  heroColor: 'cream',
  secAColor: 'white',
  secBColor: 'cream',
  heroPadding: 48,
  secAPadding: 64,
  secBPadding: 64,
  separator: 'bgcolor',
};

const state = { ...DEFAULTS };

// ========== Init Color Swatches ==========
function initColorSwatches(containerId, stateKey) {
  const container = document.getElementById(containerId);
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-swatch' + (state[stateKey] === c.key ? ' active' : '');
    btn.style.background = c.hex;
    if (c.key === 'white') btn.style.border = '2px solid #ddd';
    btn.dataset.key = c.key;
    btn.dataset.label = c.label;
    btn.title = c.label + ' (' + c.hex + ')';
    btn.addEventListener('click', () => {
      state[stateKey] = c.key;
      container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      updateAll();
    });
    container.appendChild(btn);
  });
}

initColorSwatches('hero-colors', 'heroColor');
initColorSwatches('secA-colors', 'secAColor');
initColorSwatches('secB-colors', 'secBColor');

// ========== Toggle Buttons ==========
function initToggle(containerId, stateKey) {
  const container = document.getElementById(containerId);
  container.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state[stateKey] = btn.dataset.val;
      container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateAll();
    });
  });
}

initToggle('template-toggle', 'template');
initToggle('separator-toggle', 'separator');

// ========== Sliders ==========
function initSlider(sliderId, valId, stateKey) {
  const slider = document.getElementById(sliderId);
  const valDisplay = document.getElementById(valId);
  slider.addEventListener('input', () => {
    state[stateKey] = parseInt(slider.value);
    valDisplay.textContent = slider.value + 'px';
    updateAll();
  });
}

initSlider('hero-padding', 'hero-padding-val', 'heroPadding');
initSlider('secA-padding', 'secA-padding-val', 'secAPadding');
initSlider('secB-padding', 'secB-padding-val', 'secBPadding');

// ========== Presets ==========
const PRESETS = {
  'tools-index':  { template: 'index',   heroColor: 'cream',  secAColor: 'white',  secBColor: 'cream',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'bgcolor' },
  'workshops':    { template: 'listing',  heroColor: 'white',  secAColor: 'white',  secBColor: 'white',  heroPadding: 48, secAPadding: 48, secBPadding: 48, separator: 'hr' },
  'all-white':    { template: null,       heroColor: 'white',  secAColor: 'white',  secBColor: 'white',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'hr' },
  'all-cream':    { template: null,       heroColor: 'cream',  secAColor: 'cream',  secBColor: 'cream',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'hr' },
  'alternating':  { template: null,       heroColor: 'cream',  secAColor: 'white',  secBColor: 'cream',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'bgcolor' },
  'cream-hero':   { template: null,       heroColor: 'cream',  secAColor: 'white',  secBColor: 'white',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'hr' },
  'subtle-hero':  { template: null,       heroColor: 'subtle', secAColor: 'white',  secBColor: 'cream',  heroPadding: 48, secAPadding: 64, secBPadding: 64, separator: 'bgcolor' },
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = PRESETS[btn.dataset.preset];
    if (p.template) state.template = p.template;
    state.heroColor = p.heroColor;
    state.secAColor = p.secAColor;
    state.secBColor = p.secBColor;
    state.heroPadding = p.heroPadding;
    state.secAPadding = p.secAPadding;
    state.secBPadding = p.secBPadding;
    state.separator = p.separator;
    syncControls();
    updateAll();
  });
});

// ========== Sync Controls to State ==========
function syncControls() {
  // Template
  document.querySelectorAll('#template-toggle .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === state.template);
  });
  // Separator
  document.querySelectorAll('#separator-toggle .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === state.separator);
  });
  // Colors
  ['hero-colors', 'secA-colors', 'secB-colors'].forEach((id, i) => {
    const key = ['heroColor', 'secAColor', 'secBColor'][i];
    document.querySelectorAll('#' + id + ' .color-swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.key === state[key]);
      if (s.dataset.key === 'white') {
        s.style.borderColor = s.dataset.key === state[key] ? 'var(--ui-accent)' : '#ddd';
      }
    });
  });
  // Sliders
  document.getElementById('hero-padding').value = state.heroPadding;
  document.getElementById('hero-padding-val').textContent = state.heroPadding + 'px';
  document.getElementById('secA-padding').value = state.secAPadding;
  document.getElementById('secA-padding-val').textContent = state.secAPadding + 'px';
  document.getElementById('secB-padding').value = state.secBPadding;
  document.getElementById('secB-padding-val').textContent = state.secBPadding + 'px';
}

// ========== Update All ==========
function renderPreview() {
  const preview = document.getElementById('preview');
  switch (state.template) {
    case 'index':   preview.innerHTML = renderIndex(); break;
    case 'listing': preview.innerHTML = renderListing(); break;
    case 'detail':  preview.innerHTML = renderDetail(); break;
  }
}

function updatePrompt() {
  const heroInfo = colorInfo(state.heroColor);
  const secAInfo = colorInfo(state.secAColor);
  const secBInfo = colorInfo(state.secBColor);

  const templateNames = { index: 'Index (Gidsen en tools)', listing: 'Listing (Workshops/Videolessen)', detail: 'Detail (Workshop detail)' };
  const sepNames = { none: 'geen scheiding', bgcolor: 'achtergrondkleurwisseling', hr: 'HR-lijn' };

  let parts = [];
  parts.push(`Pas het sectie-layout patroon toe op de ${templateNames[state.template]} pagina:`);
  parts.push('');
  parts.push(`Hero:     ${heroInfo.twClass}  padding-y: ${state.heroPadding}px (py-[${state.heroPadding}px])`);
  parts.push(`Sectie A: ${secAInfo.twClass}  padding-y: ${state.secAPadding}px (py-[${state.secAPadding}px])`);
  parts.push(`Sectie B: ${secBInfo.twClass}  padding-y: ${state.secBPadding}px (py-[${state.secBPadding}px])`);
  parts.push('');
  parts.push(`Scheiding: ${sepNames[state.separator]}`);

  // Summary description
  const allSame = state.heroColor === state.secAColor && state.secAColor === state.secBColor;
  if (allSame) {
    parts.push('');
    parts.push(`Alle secties gebruiken dezelfde achtergrond (${heroInfo.label}).`);
  } else if (state.heroColor !== state.secAColor && state.secAColor !== state.secBColor) {
    parts.push('');
    parts.push(`Patroon: ${heroInfo.label} → ${secAInfo.label} → ${secBInfo.label} (afwisselend).`);
  }

  document.getElementById('prompt-text').textContent = parts.join('\n');
}

function updateAll() {
  renderPreview();
  updatePrompt();
}

// ========== Copy Button ==========
document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Gekopieerd!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopieer'; btn.classList.remove('copied'); }, 1500);
  });
});

// ========== Init ==========
updateAll();
